<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Markdown × Gemini — Live Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface-2: #16161f;
      --border: #1e1e2e;
      --text: #e1e4e8;
      --muted: #6b7280;
      --accent: #748FFC;
      --accent-hover: #5C7CFA;
      --green: #3fb950;
      --red: #f85149;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
    }
    header h1 .accent { color: var(--accent); }
    header h1 .gemini { color: #4285F4; }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .model-select, .api-key-input {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
    }
    .api-key-input {
      width: 220px;
      font-family: 'JetBrains Mono', monospace;
    }
    .api-key-input::placeholder { color: #484f58; }
    .api-key-input:focus { outline: none; border-color: var(--accent); }
    .api-key-label { font-size: 11px; color: var(--muted); }

    /* Theme extraction row */
    .theme-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-row input[type="text"] {
      width: 200px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
    }
    .theme-row input[type="text"]::placeholder { color: #484f58; }
    .theme-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
    #theme-status {
      font-size: 11px;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main Layout ────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left Panel (Chat + Controls) ───────── */
    .left-panel {
      width: 480px;
      min-width: 320px;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Tab-like section headers */
    .section-label {
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }

    /* Input area at TOP */
    .input-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-section textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 72px;
      max-height: 160px;
    }
    .input-section textarea:focus { border-color: var(--accent); }
    .input-section textarea::placeholder { color: #484f58; }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-actions .spacer { flex: 1; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    button:hover { background: #1a1a2e; border-color: #484f58; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 7px 20px;
    }
    button.primary:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.sm { padding: 4px 10px; font-size: 11px; }
    button.ghost { border-color: transparent; background: transparent; color: var(--muted); }
    button.ghost:hover { color: var(--text); background: var(--surface-2); }
    button.ghost.danger { color: var(--red); }
    button.ghost.danger:hover { background: rgba(248,81,73,0.1); }

    /* Streaming indicator */
    .status-bar {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .streaming-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #484f58;
      flex-shrink: 0;
    }
    .streaming-dot.active {
      background: var(--green);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Messages / raw output */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      max-width: 85%;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      max-width: 100%;
      max-height: 200px;
      overflow-y: auto;
    }
    .message.system {
      align-self: center;
      color: var(--muted);
      font-size: 11px;
      font-style: italic;
      text-align: center;
      padding: 6px;
    }

    /* ── Canvas Pane ────────────────────────── */
    .canvas-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
    }
    .canvas-header {
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    canvas {
      border-radius: 6px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
      background: #0D1117;
    }
    .raw-output {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      background: var(--bg);
    }
    .raw-output.visible { display: block; }
    .canvas-wrap.hidden { display: none; }

    /* ── Panel Resize Handle (between left panel and canvas) ── */
    .panel-resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s;
      position: relative;
      z-index: 15;
    }
    .panel-resize-handle:hover,
    .panel-resize-handle.dragging {
      background: var(--accent);
    }
    .panel-resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 36px;
      border-radius: 2px;
      background: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .panel-resize-handle:hover::after,
    .panel-resize-handle.dragging::after {
      opacity: 1;
      background: #fff;
    }
    body.resizing-panel {
      cursor: col-resize !important;
      user-select: none;
    }

    /* ── Canvas Resize Handles (both edges) ── */
    .canvas-resize-container {
      position: relative;
      display: inline-block;
    }
    .canvas-resize-handle {
      position: absolute;
      top: 0;
      width: 24px;
      height: 100%;
      cursor: ew-resize;
      z-index: 20;
    }
    .canvas-resize-handle.right { right: -12px; }
    .canvas-resize-handle.left { left: -12px; }

    .canvas-resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 40px;
      border-radius: 2px;
      background: var(--muted);
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }
    .canvas-resize-handle.right::after { right: 8px; }
    .canvas-resize-handle.left::after { left: 8px; }

    .canvas-resize-handle:hover::after,
    .canvas-resize-handle.dragging::after {
      opacity: 1;
      background: var(--accent);
    }
    body.resizing-canvas {
      cursor: ew-resize !important;
      user-select: none;
    }
    .canvas-width-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 25;
    }
    .canvas-width-label.visible { opacity: 1; }

    /* ── Stats Bar ──────────────────────────── */
    .stats-bar {
      padding: 6px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .stat { display: flex; gap: 4px; }
    .stat-label { color: #484f58; }
    .stat-value { color: #58a6ff; }
    .stat-value.good { color: var(--green); }
    .stat-value.warn { color: #d29922; }
  </style>
</head>
<body>
  <header>
    <h1><span class="accent">Spatial Markdown</span> × <span class="gemini">Gemini</span></h1>
<div class="header-controls">
        <div class="theme-row">
          <input type="text" id="theme-url" placeholder="Paste website URL to extract theme…" />
          <button id="btn-extract-theme" class="sm primary">Extract</button>
          <span id="theme-status"></span>
          <button id="btn-theme-toggle" class="sm ghost">☀ Light</button>
        </div>
        <select class="model-select" id="model-select">
          <option value="gemini-3-flash-preview" selected>Gemini 3 Flash</option>
          <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
          <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite</option>
          <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
        <span class="api-key-label">API Key</span>
        <input type="password" class="api-key-input" id="api-key" placeholder="AIzaSy..." autocomplete="off" />
      </div>
  </header>

  <main>
    <!-- Left Panel -->
    <div class="left-panel" id="left-panel">
      <div class="section-label">Prompt</div>
      <div class="input-section">
        <textarea id="user-input" rows="3" placeholder="Try: &quot;Brief me on quantum computing progress in 2026&quot; · &quot;Compare Postgres vs SQLite for edge apps&quot; · &quot;Q4 sales dashboard with 4 metrics and a regional breakdown&quot;" autofocus></textarea>
        <div class="input-actions">
          <button id="btn-stop" disabled class="sm">Stop</button>
          <button id="btn-clear" class="sm ghost danger">Clear</button>
          <span class="spacer"></span>
          <button id="btn-send" class="primary">Send</button>
        </div>
      </div>

      <div class="status-bar">
        <span class="streaming-dot" id="stream-dot"></span>
        <span id="status-text">Ready</span>
      </div>

      <div class="section-label" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Response</span>
        <button id="btn-raw" class="sm ghost">Raw Markup</button>
      </div>
      <div class="messages" id="messages">
        <div class="message system">Responses appear here and render live on the canvas →</div>
      </div>
    </div>

    <!-- Panel Resize Handle -->
    <div class="panel-resize-handle" id="panel-resize-handle"></div>

    <!-- Canvas Output -->
    <div class="canvas-pane">
      <div class="canvas-header">
        <span>Canvas Output</span>
        <span id="canvas-dims" style="font-weight: 400;">900 × auto</span>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="canvas-resize-container" id="canvas-resize-container">
          <div class="canvas-resize-handle left" id="canvas-resize-left"></div>
          <canvas id="output-canvas" width="900" height="600"></canvas>
          <div class="canvas-resize-handle right" id="canvas-resize-right"></div>
          <div class="canvas-width-label" id="canvas-width-label">900px</div>
        </div>
      </div>
      <div class="raw-output" id="raw-output"></div>
    </div>
  </main>

  <div class="stats-bar">
    <div class="stat"><span class="stat-label">Tokens:</span><span class="stat-value" id="stat-tokens">0</span></div>
    <div class="stat"><span class="stat-label">Nodes:</span><span class="stat-value" id="stat-nodes">0</span></div>
    <div class="stat"><span class="stat-label">Cmds:</span><span class="stat-value" id="stat-commands">0</span></div>
    <div class="stat"><span class="stat-label">Layout:</span><span class="stat-value" id="stat-layout">—</span></div>
    <div class="stat"><span class="stat-label">Frames:</span><span class="stat-value" id="stat-frames">0</span></div>
  </div>

  <script type="module" src="./gemini-demo.ts"></script>
</body>
</html>
