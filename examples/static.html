<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatial Markdown — Static Rendering</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #0b0d10;
        color: #e6e8eb;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        min-height: 100vh;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8a94a6;
      }

      canvas {
        display: block;
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        background: #111418;
      }

      .subtitle {
        margin: 0;
        font-size: 13px;
        color: #6b7280;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Spatial Markdown — Static Rendering</h1>
    <canvas id="stage" width="960" height="720"></canvas>
    <p class="subtitle">No streaming required. Just markup in, pixels out.</p>

    <script type="module" src="./static-demo.ts"></script>
  </body>
</html>
