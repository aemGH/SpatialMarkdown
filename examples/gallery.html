<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Markdown Gallery — Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --surface-2: #121212;
      --border: #1a1a1a;
      --text: #e0e0e0;
      --text-muted: #808080;
      --accent: #ffffff;
      --accent-muted: #404040;
      --red: #ff4d4d;
      --green: #00ff88;
      --panel-width: 360px;
      --header-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────── */
    header {
      height: var(--header-height);
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: var(--surface-2);
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover {
      background: var(--surface-2);
      border-color: var(--accent-muted);
    }

    button.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    button.primary:hover {
      background: #e0e0e0;
    }

    button.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }

    button.ghost:hover {
      color: var(--text);
      background: var(--surface);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Main Layout ─────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Sidebar ──────────────────────────────── */
    .sidebar {
      width: var(--panel-width);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
      flex-shrink: 0;
      transition: width 0.3s ease;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .example-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-item {
      padding: 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .example-item:hover {
      background: var(--surface);
      border-color: var(--border);
    }

    .example-item.active {
      background: var(--surface-2);
      border-color: var(--accent-muted);
    }

    .example-item .title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .example-item .desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    /* ── Canvas Area ─────────────────────────── */
    .canvas-container {
      flex: 1;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .canvas-toolbar {
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .canvas-viewport {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      border-radius: 4px;
      background: #0D1117;
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    .canvas-resize-handle {
      position: absolute;
      top: 0;
      width: 8px;
      height: 100%;
      cursor: ew-resize;
      z-index: 10;
      transition: background 0.2s;
    }

    .canvas-resize-handle:hover,
    .canvas-resize-handle.dragging {
      background: rgba(255,255,255,0.1);
    }

    .canvas-resize-handle.left { left: -4px; }
    .canvas-resize-handle.right { right: -4px; }

    .width-indicator {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--bg);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .width-indicator.visible { opacity: 1; }

    /* ── Raw View ────────────────────────────── */
    .raw-viewer {
      position: absolute;
      inset: 48px 0 0 0;
      background: var(--bg);
      z-index: 50;
      display: none;
      padding: 40px;
      overflow-y: auto;
    }

    .raw-viewer.visible { display: block; }

    .raw-viewer pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #888;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
    }

    .raw-viewer .tag { color: #fff; font-weight: 500; }
    .raw-viewer .attr { color: #aaa; }
    .raw-viewer .val { color: var(--green); }

    /* ── Status Bar ──────────────────────────── */
    .status-bar {
      height: 32px;
      padding: 0 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-item span { color: var(--text); margin-left: 4px; }

    .streaming-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .streaming-indicator.active { opacity: 1; }

    .dot {
      width: 6px;
      height: 6px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Utilities ───────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Spatial Engine</h1>
      <span class="tag">Gallery</span>
    </div>
    <div class="header-actions">
      <button id="btn-theme" class="ghost">Dark</button>
      <button id="btn-raw" class="ghost">View Markup</button>
      <button id="btn-stream" class="primary">Simulate Stream</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Curated Examples</h2>
      </div>
      <div class="example-list" id="example-list">
        <!-- Examples will be injected here -->
      </div>
      <div class="sidebar-footer">
        <div class="control-group">
          <div class="control-label">
            <span>Streaming Speed</span>
            <span id="speed-val">50</span>
          </div>
          <input type="range" id="speed-range" min="1" max="100" value="50">
        </div>
        <button id="btn-instant" style="width: 100%;">Render Instantly</button>
      </div>
    </aside>

    <div class="canvas-container">
      <div class="canvas-toolbar">
        <div id="active-example-name">Select an example</div>
        <div id="canvas-dims">900 × auto</div>
      </div>
      
      <div class="canvas-viewport">
        <div class="canvas-wrapper" id="canvas-wrapper">
          <div class="width-indicator" id="width-indicator">900px</div>
          <div class="canvas-resize-handle left" id="resize-left"></div>
          <canvas id="output-canvas"></canvas>
          <div class="canvas-resize-handle right" id="resize-right"></div>
        </div>
      </div>

      <div class="raw-viewer" id="raw-viewer">
        <pre id="raw-content"></pre>
      </div>
    </div>
  </main>

  <div class="status-bar">
    <div class="streaming-indicator" id="stream-status">
      <div class="dot"></div>
      <span>Streaming...</span>
    </div>
    <div class="status-item">Layout: <span id="stat-layout">—</span></div>
    <div class="status-item">Nodes: <span id="stat-nodes">0</span></div>
    <div class="status-item">Commands: <span id="stat-commands">0</span></div>
    <div class="status-item">Chars: <span id="stat-chars">0</span></div>
  </div>

  <script type="module" src="./gallery-demo.ts"></script>
</body>
</html>
